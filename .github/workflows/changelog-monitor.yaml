name: Changelog Monitor

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  monitor:
    name: Check for new CC changelog entries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch CC CHANGELOG.md
        run: |
          curl -sSfL \
            "https://raw.githubusercontent.com/anthropics/claude-code/main/CHANGELOG.md" \
            -o /tmp/CC-CHANGELOG.md
          echo "Downloaded $(wc -l < /tmp/CC-CHANGELOG.md) lines"

      - name: Run comparison script
        id: compare
        run: |
          set +e
          python .github/scripts/changelog-compare.py \
            --changelog /tmp/CC-CHANGELOG.md \
            --scan-doc docs/CC-changelog-feature-scan.md \
            --docs-dir docs/ \
            --update-scan-doc \
            > /tmp/report.md 2>/tmp/compare-stderr.txt
          EXIT_CODE=$?
          set -e

          cat /tmp/compare-stderr.txt >&2

          if [ $EXIT_CODE -eq 1 ]; then
            echo "new_features=true" >> "$GITHUB_OUTPUT"
          else
            echo "new_features=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create branch and PR for uncovered features
        if: steps.compare.outputs.new_features == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/changelog-triage-$(date -u +%Y-%m-%d)"
          DATE_STAMP=$(date -u +%Y-%m-%d)

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Create branch
          git checkout -b "$BRANCH"

          # Copy report to repo
          cp /tmp/report.md "docs/changelog-triage-${DATE_STAMP}.md"

          # Stage updated scan doc (frontmatter bumped by --update-scan-doc)
          # and the new triage report
          git add docs/CC-changelog-feature-scan.md
          git add "docs/changelog-triage-${DATE_STAMP}.md"

          git commit -m "chore: changelog triage ${DATE_STAMP}

          Auto-generated by changelog-monitor workflow."

          git push origin "$BRANCH"

          # Build PR body
          {
            echo "## CC Changelog: New Uncovered Features Detected"
            echo ""
            echo "_Auto-generated by changelog-monitor. Review, update docs, then merge._"
            echo ""
            cat /tmp/report.md
          } > /tmp/pr-body.md

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: changelog triage ${DATE_STAMP}" \
            --body-file /tmp/pr-body.md \
            --label changelog-scan
